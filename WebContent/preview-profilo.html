<main class="section narrow">
	<h1>Profilo</h1>
	<p class="success-msg">Profilo aggiornato.</p>

		<input name="cognome" value="Rossi" placeholder="Cognome">
		<span class="error"></span>
		<input type="email" name="email" value="maria.rossi@example.it" placeholder="Email">
		<span class="error"></span>
		<input type="password" name="password" value="password123" placeholder="Password">
		<span class="error"></span>
		<input type="date" name="data_nascita" value="1999-04-18">
		<span class="error"></span>
		<input name="cellulare" value="+39 333 1234567" placeholder="Cellulare">
		<span class="error"></span>
		<input name="via" value="Via Roma" placeholder="Via">
		<span class="error"></span>
		<input name="civico" value="12" placeholder="Civico">
		<span class="error"></span>
		<input name="cap" value="00100" placeholder="CAP">
		<span class="error"></span>
		<input name="nazione" value="Italia" placeholder="Nazione">
		<span class="error"></span>
		<input name="citta" value="Roma" placeholder="Citta">
		<span class="error"></span>
		<button class="primary" type="button">Aggiorna</button>
	</form>
</main>
