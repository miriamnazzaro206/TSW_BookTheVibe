<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview Palette Nuova - BookTheVibe</title>
<link rel="stylesheet" href="styles/main.css">
<style>
:root {
	--green: #8EB9FC;
	--lime: #FFF197;
	--violet: #274DEA;
	--orange: #FF513D;
	--deep: #274DEA;
	--ink: #274DEA;
	--muted: #FF513D;
	--paper: color-mix(in srgb, #EBFFDC 82%, white);
	--surface: color-mix(in srgb, #EBFFDC 45%, white);
	--line: color-mix(in srgb, #8EB9FC 55%, #274DEA);
	--danger: #FF513D;
	--shadow-soft: 0 10px 24px color-mix(in srgb, #274DEA 16%, transparent);
	--shadow-card: 0 14px 28px color-mix(in srgb, #8EB9FC 28%, transparent);
}
body {
	background: linear-gradient(180deg, color-mix(in srgb, #EBFFDC 58%, transparent), transparent 260px), var(--paper);
}
.topbar {
	background: linear-gradient(90deg, color-mix(in srgb, #EBFFDC 72%, white), color-mix(in srgb, #8EB9FC 35%, white));
	border-bottom-color: #8EB9FC;
}
.hero {
	background:
		linear-gradient(135deg, color-mix(in srgb, #8EB9FC 48%, transparent), color-mix(in srgb, #FFF197 42%, transparent)),
		linear-gradient(180deg, color-mix(in srgb, #EBFFDC 70%, white), color-mix(in srgb, #FF513D 12%, white));
}
.primary {
	background: #274DEA;
	border-color: #274DEA;
}
.nav-left button::after {
	background: #FF513D;
}
.icon-link {
	background: color-mix(in srgb, #8EB9FC 30%, white);
}
th {
	background: color-mix(in srgb, #8EB9FC 42%, #EBFFDC);
}
</style>
</head>
<body>
<nav class="topbar">
	<a class="brand" href="#">BookTheVibe</a>
	<div class="nav-left">
		<div class="dropdown">
			<button type="button">Categorie</button>
			<div class="dropdown-menu">
				<a href="#">Eventi</a>
				<a href="#">Gite</a>
				<a href="#">Esperienze</a>
			</div>
		</div>
		<div class="dropdown">
			<button type="button">Città</button>
			<div class="dropdown-menu">
				<a href="#">Roma</a>
				<a href="#">Firenze</a>
				<a href="#">Venezia</a>
			</div>
		</div>
	</div>
	<div class="nav-right">
		<a href="#">Home</a>
		<a class="icon-link" href="#" aria-label="Carrello">&#128722;</a>
		<a class="icon-link" href="#" aria-label="Login">&#128100;</a>
	</div>
</nav>
<main>
	<section class="hero">
		<p class="logo-mark">BTV</p>
		<h1>ESPLORA.PRENOTA.VIVI</h1>
		<div class="photo-carousel">
			<div style="background-image:url('https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?auto=format&fit=crop&w=900&q=80')"></div>
			<div style="background-image:url('https://images.unsplash.com/photo-1529260830199-42c24126f198?auto=format&fit=crop&w=900&q=80')"></div>
			<div style="background-image:url('https://images.unsplash.com/photo-1531572753322-ad063cecc140?auto=format&fit=crop&w=900&q=80')"></div>
			<div style="background-image:url('https://images.unsplash.com/photo-1552832230-c0197dd311b5?auto=format&fit=crop&w=900&q=80')"></div>
			<div style="background-image:url('https://images.unsplash.com/photo-1516483638261-f4dbaf036963?auto=format&fit=crop&w=900&q=80')"></div>
			<div style="background-image:url('https://images.unsplash.com/photo-1534445867742-43195f401b6c?auto=format&fit=crop&w=900&q=80')"></div>
			<div style="background-image:url('https://images.unsplash.com/photo-1533676802871-eca1ae998cd5?auto=format&fit=crop&w=900&q=80')"></div>
			<div style="background-image:url('https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?auto=format&fit=crop&w=900&q=80')"></div>
			<div style="background-image:url('https://images.unsplash.com/photo-1529260830199-42c24126f198?auto=format&fit=crop&w=900&q=80')"></div>
			<div style="background-image:url('https://images.unsplash.com/photo-1531572753322-ad063cecc140?auto=format&fit=crop&w=900&q=80')"></div>
		</div>
	</section>
	<section class="section">
		<h2>Attivita disponibili</h2>
		<div class="activity-strip">
			<a class="activity-card" href="#">
				<img src="https://images.unsplash.com/photo-1515542622106-78bda8ba0e5b?auto=format&fit=crop&w=700&q=80" alt="Roma segreta">
				<strong>Roma segreta al tramonto</strong>
				<span>Roma - Esperienze - &euro; 39.00</span>
			</a>
			<a class="activity-card" href="#">
				<img src="https://images.unsplash.com/photo-1543429258-cc721a521a06?auto=format&fit=crop&w=700&q=80" alt="Firenze">
				<strong>Tour artistico a Firenze</strong>
				<span>Firenze - Gite - &euro; 49.00</span>
			</a>
			<a class="activity-card" href="#">
				<img src="https://images.unsplash.com/photo-1534113414509-0eec2bfb493f?auto=format&fit=crop&w=700&q=80" alt="Venezia">
				<strong>Venezia in gondola</strong>
				<span>Venezia - Esperienze - &euro; 65.00</span>
			</a>
		</div>
	</section>
</main>
</body>
</html>
